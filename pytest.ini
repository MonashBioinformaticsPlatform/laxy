[pytest]
DJANGO_SETTINGS_MODULE = laxy.test_settings
python_files = laxy_backend/tests/test_*.py laxy_genomes/tests/test_*.py tests/integration/test_*.py tests/data/annotation_corpus/test_*.py
testpaths =
    laxy_backend/tests
    laxy_genomes/tests
    tests/integration
markers =
    integration: marks tests as integration tests (requires --integration to run)
    corpus: synthetic annotation corpus (FASTA/GTF/GFF3 + reads); run with `just test-annotation-corpus`
    e2e: end-to-end nf-core/rnaseq run (slow; needs nextflow + containers + fake-cluster)
