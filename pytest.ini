[pytest]
DJANGO_SETTINGS_MODULE = laxy.test_settings
python_files = laxy_backend/tests/test_*.py laxy_genomes/tests/test_*.py tests/integration/test_*.py
testpaths =
    laxy_backend/tests
    laxy_genomes/tests
    tests/integration
markers =
    integration: marks tests as integration tests (requires --integration to run)
